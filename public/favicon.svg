<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#fbbf24"/>
  
  <!-- Chicken body -->
  <ellipse cx="32" cy="38" rx="16" ry="14" fill="#fff"/>
  
  <!-- Chicken head -->
  <circle cx="32" cy="22" r="10" fill="#fff"/>
  
  <!-- Beak -->
  <polygon points="42,22 52,20 42,24" fill="#f97316"/>
  
  <!-- Comb (red thing on top) -->
  <path d="M28 8 Q32 14 32 8 Q32 14 36 8 Q36 14 32 12 Q28 14 28 8" fill="#ef4444"/>
  
  <!-- Eye -->
  <circle cx="35" cy="20" r="2" fill="#1a1a2e"/>
  
  <!-- Wings -->
  <ellipse cx="20" cy="38" rx="6" ry="8" fill="#fef3c7"/>
  <ellipse cx="44" cy="38" rx="6" ry="8" fill="#fef3c7"/>
  
  <!-- Feet -->
  <rect x="26" y="50" width="4" height="8" rx="1" fill="#f97316"/>
  <rect x="34" y="50" width="4" height="8" rx="1" fill="#f97316"/>
</svg>